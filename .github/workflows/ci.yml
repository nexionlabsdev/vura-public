name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Update npm CLI
        shell: bash
        run: npm install -g npm@latest

      - name: Install workspace dependencies
        run: npm install --no-audit --no-fund

      # Dependency order matters: each of these imports the compiled `out/`
      # of the ones before it via the npm workspace symlinks.
      - name: Build core-sdk
        run: npm run compile --workspace=packages/core-sdk

      - name: Build vura-dataverse-sync-core
        run: npm run compile --workspace=packages/vura-dataverse-sync-core

      - name: Build vura-runner
        run: npm run compile --workspace=packages/vura-runner

      - name: Build vura-dataverse-runner-plugin
        run: npm run compile --workspace=packages/vura-dataverse-runner-plugin

      # core-extension and vura-dataverse-adapter are deliberately NOT workspace
      # members (see root package.json) — they depend on @vura-data-os/* as
      # normal npm packages, resolved from the registry once published.
      # Before that, install-local-deps.sh overlays fresh tarballs of the
      # local library packages instead, so this build reflects the current
      # branch, not whatever's last published.
      - name: Build vura-dataverse-adapter
        shell: bash
        run: |
          ./scripts/install-local-deps.sh vura-dataverse-adapter
          cd packages/vura-dataverse-adapter && npm run compile

      - name: Build core-extension
        shell: bash
        run: |
          ./scripts/install-local-deps.sh core-extension
          cd packages/core-extension && npm run compile

      - name: Run vura-runner test suite
        run: npm test --workspace=packages/vura-runner
