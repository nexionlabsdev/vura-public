<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VURA | Serve Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2>VURA</h2>
                <div class="theme-toggle">
                    <button id="theme-btn" aria-label="Toggle Theme">
                        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                </div>
            </div>
            <div class="sidebar-content">
                <h3>Active Flows</h3>
                <ul id="flows-list" class="flows-list">
                    <!-- Flows injected here -->
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav glass-panel">
                <h1 id="flow-title">Select a flow</h1>
                <div class="status-indicator">
                    <span class="pulse-dot"></span> Listening for events...
                </div>
            </header>

            <div class="content-grid">
                <!-- Schema Panel -->
                <section class="card schema-panel glass-panel">
                    <div class="card-header">
                        <h2>API Contract</h2>
                    </div>
                    <div class="card-body">
                        <div class="schema-section">
                            <h3>Input Schema</h3>
                            <pre id="input-schema"><code class="json">{}</code></pre>
                        </div>
                        <div class="schema-section">
                            <h3>Output Schema</h3>
                            <pre id="output-schema"><code class="json">{}</code></pre>
                        </div>
                    </div>
                </section>

                <!-- Live Tracking & History -->
                <section class="card tracking-panel glass-panel">
                    <div class="card-header tabs">
                        <button class="tab-btn active" data-target="live-view">Live Tracking</button>
                        <button class="tab-btn" data-target="history-view">Run History</button>
                    </div>
                    
                    <div class="card-body tab-content active" id="live-view">
                        <div class="live-status" id="live-status">Waiting for execution...</div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
                        </div>
                        <div class="logs-container" id="logs-container">
                            <!-- Logs injected here -->
                        </div>
                    </div>

                    <div class="card-body tab-content" id="history-view">
                        <table class="history-table">
                            <thead>
                                <tr>
                                    <th>Run ID</th>
                                    <th>Status</th>
                                    <th>Timestamp</th>
                                    <th>Duration</th>
                                </tr>
                            </thead>
                            <tbody id="history-body">
                                <!-- History injected here -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
